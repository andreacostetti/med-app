name: Build Android APK (Node 24 Optimized)
on:
  push:
    branches: [ main ]

# Impostiamo la variabile d'ambiente a livello di workflow per anticipare l'obbligo di giugno
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4 # Le v4 sono già compatibili con i nuovi runner

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Passiamo alla versione stabile più recente del 2026

      - name: Installa dipendenze
        run: npm install

      - name: Build progetto Svelte 5
        run: npm run build

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Sync Capacitor 8.3.1
        run: |
          npx cap sync android

      - name: Build dell'APK (Debug)
        run: |
          cd android && ./gradlew assembleDebug

      - name: Carica l'APK come artefatto
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-node24
          path: android/app/build/outputs/apk/debug/app-debug.apk
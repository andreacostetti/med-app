name: Build Android APK (Full Node 24 Compliance)
on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Aggiornato a v4.2.2+ o v5 (controlla i tag più recenti nel 2026)
      - name: Checkout del codice
        uses: actions/checkout@v4 

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm' # Ottimo per velocizzare le build successive

      - name: Installa dipendenze
        run: npm ci # Più veloce e pulito di 'install' in ambienti CI

      - name: Build progetto Svelte 5
        run: npm run build

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle' # Fondamentale per non riscaricare Gradle ogni volta

      - name: Sync Capacitor 8.3.1
        run: npx cap sync android

      - name: Build dell'APK (Debug)
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug

      - name: Carica l'APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7 # Risparmia spazio sul tuo GitHub storage
name: Build Android APK
on:
  push:
    branches: [ main ] # Si attiva quando fai il push su main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Ottimale per Svelte 5

      - name: Installa dipendenze
        run: npm install

      - name: Build progetto Svelte 5
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # Necessaria per le ultime versioni di Android/Capacitor

      - name: Sync Capacitor 8.3.1
        run: |
          npx cap sync android

      - name: Build dell'APK (Debug)
        run: |
          cd android && ./gradlew assembleDebug

      - name: Carica l'APK come artefatto
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk